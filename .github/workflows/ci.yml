name: CI

# Runs on every PR and on pushes to main. Make this check "required" in the
# repo's branch-protection rules so only green code can merge to main (which
# Vercel then auto-deploys to production).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint · type-check · build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: node_modules/.bin/tsc -b --noEmit

      - name: Build
        run: npm run build
        env:
          # Vite inlines VITE_* at build time. Real values live in Vercel; CI
          # only needs the build to succeed, so placeholders are fine here.
          VITE_API_BASE_URL: https://example.com/api/v1
          VITE_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
